<div class="page-inner">
  <div class="page-header">
    <h3 class="fw-bold mb-3">User Management</h3>
    <ul class="breadcrumbs mb-3">
      <li class="nav-home">
        <a href="#">
          <i class="fas fa-home"></i>
        </a>
      </li>
      <li class="separator">
        <i class="fas fa-arrow-right"></i>
      </li>
      <li class="nav-item">
        <a href="#">Admin</a>
      </li>
      <li class="separator">
        <i class="fas fa-arrow-right"></i>
      </li>
      <li class="nav-item">
        <a href="#">Users</a>
      </li>
    </ul>
  </div>
  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header">
          <div class="card-title">All Registered Users</div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-bordered table-hover">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>First Name</th>
                  <th>Last Name</th>
                  <th>Email</th>
                  <th>Phone Number</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let user of users">
                  <td>{{ user.id }}</td>
                  <td>{{ user.firstname }}</td>
                  <td>{{ user.lastname }}</td>
                  <td>{{ user.username }}</td>
                  <td>{{ user.phoneNumber }}</td>
                  <td>
                    <span [class]="user.enabled ? 'badge badge-success' : 'badge badge-danger'">
                      {{ user.enabled ? 'Active' : 'Inactive' }}
                    </span>
                  </td>
                </tr>
                <tr *ngIf="users.length === 0 && !loading">
                  <td colspan="6" class="text-center">No users found.</td>
                </tr>
                <tr *ngIf="loading">
                  <td colspan="6" class="text-center">Loading users...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
