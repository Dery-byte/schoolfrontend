<div class="app-shell">
  <!-- Mobile overlay backdrop — closes sidebar when tapped -->
  <div class="sidebar-backdrop"
       [class.active]="sidebarOpen"
       (click)="closeSidebar()">
  </div>

  <app-user-sidebar [isOpen]="sidebarOpen"></app-user-sidebar>

  <div class="app-main">
    <app-user-header (sidebarToggle)="toggleSidebar()"></app-user-header>
    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
