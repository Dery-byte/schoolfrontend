<aside class="sidebar" [class.open]="isOpen">
  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z" stroke="#fff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 12v5c3 3 9 3 12 0v-5" stroke="#fff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="brand-name">EduVision</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <span class="nav-label-group">Main Menu</span>

    <a class="nav-item" routerLink="/user/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </span>
      <span class="nav-text">Dashboard</span>
    </a>

    <a class="nav-item" routerLink="/user/checkResults" routerLinkActive="active">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
      </span>
      <span class="nav-text">Check Results</span>
    </a>

    <a class="nav-item" routerLink="/user/checkEligilibilty" routerLinkActive="active">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
      </span>
      <span class="nav-text">Eligibility Reports</span>
    </a>
  </nav>

  <!-- User footer -->
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">{{ userInitial }}</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">{{ userName || 'Student' }}</span>
        <span class="sidebar-user-role">EduVision User</span>
      </div>
    </div>
  </div>
</aside>
