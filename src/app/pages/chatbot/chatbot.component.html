<!-- Floating chat bubble -->
<div class="mudita-launcher" (click)="toggleChat()" [class.open]="isOpen" title="Chat with Mudita">
  <span class="launcher-icon" *ngIf="!isOpen">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </span>
  <span class="launcher-icon" *ngIf="isOpen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </span>
</div>

<!-- Chat window -->
<div class="mudita-window" [class.visible]="isOpen">
  <!-- Header -->
  <div class="mudita-header">
    <div class="mudita-avatar">M</div>
    <div class="mudita-info">
      <span class="mudita-name">Mudita</span>
      <span class="mudita-status">
        <span class="status-dot"></span> AI Assistant
      </span>
    </div>
  </div>

  <!-- Messages -->
  <div class="mudita-messages" #messagesContainer>
    <div
      *ngFor="let msg of messages"
      class="message-row"
      [class.user-row]="msg.role === 'user'"
      [class.assistant-row]="msg.role === 'assistant'"
    >
      <div
        class="message-bubble"
        [class.user-bubble]="msg.role === 'user'"
        [class.assistant-bubble]="msg.role === 'assistant'"
        [innerHTML]="renderMarkdown(msg.content) | safeHtml"
      ></div>
    </div>

    <!-- Typing indicator -->
    <div class="message-row assistant-row" *ngIf="isTyping">
      <div class="message-bubble assistant-bubble typing-bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="mudita-input-area">
    <textarea
      class="mudita-input"
      placeholder="Ask me anything…"
      [(ngModel)]="userInput"
      (keydown)="onKeydown($event)"
      [disabled]="isTyping"
      rows="1"
    ></textarea>
    <button class="mudita-send" (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>
